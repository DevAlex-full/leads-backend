services:
  - type: web
    name: leads-backend
    env: node
    region: oregon
    plan: free
    buildCommand: npm install --include=dev && npm run build && pip install -r scripts/requirements.txt
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: ALLOWED_ORIGIN
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_NAME
        sync: false
      - key: PYTHON_ENABLED
        value: "true"
      - key: PYTHON_CMD
        value: python3
      - key: ENRICHER_CONCURRENT
        value: "5"
      - key: ENRICHER_MAX_LEADS
        value: "500"